services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:2026.7.2
    container_name: homeassistant
    restart: unless-stopped
    network_mode: host
    stop_grace_period: 1m
    environment:
      TZ: Europe/London
    cap_add:
      # Required by Home Assistant for reliable Bluetooth management without
      # granting unrestricted privileged-container access.
      - NET_ADMIN
      - NET_RAW
    volumes:
      # Runtime state stays outside Komodo's disposable Git checkout.
      - ${HOME_ASSISTANT_CONFIG_PATH:-/home/abhi/Docker/HomeAssistant/config}:/config
      - /run/dbus:/run/dbus:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8123/', timeout=5)" || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 2m
