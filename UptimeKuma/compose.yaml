services:
  UptimeKuma:
    image: louislam/uptime-kuma:2
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "extra/healthcheck"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 3m
    volumes:
      - ./data:/app/data
    # Keep homelab DNS stable across host restarts. Docker can otherwise start
    # before Tailscale and retain public resolvers that cannot resolve these names.
    dns:
      - 100.100.100.100
      - 192.168.0.220
    networks:
      proxy:
        aliases:
          - uptime-kuma

networks:
  proxy:
    external: true
    name: proxy
