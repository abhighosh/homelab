# docker-compose.yml - AdGuard Home deployment

services:
  adguard:
    image: adguard/adguardhome:v0.107.74
    container_name: adguard-home
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    # Use host network mode for DNS to work properly,
    # or map individual ports as shown below
    ports:
      # DNS serves LAN clients and the tailnet's abhighosh.co.uk split-DNS route.
      # Explicit bindings prevent exposure through public IPv6 and Docker bridges.
      - "${LAN_IP:-192.168.0.220}:53:53/tcp"
      - "${LAN_IP:-192.168.0.220}:53:53/udp"
      - "${TAILSCALE_IP:-100.99.54.40}:53:53/tcp"
      - "${TAILSCALE_IP:-100.99.54.40}:53:53/udp"
      # DNS-over-TLS
      - "${LAN_IP:-192.168.0.220}:853:853/tcp"
      # DNS-over-HTTPS
      - "${LAN_IP:-192.168.0.220}:444:443/tcp"
    volumes:
      # Persist configuration across container restarts
      - ./conf:/opt/adguardhome/conf
      # Persist work data including query logs and filters
      - ./work:/opt/adguardhome/work
    # Cap add is needed if you want to use DHCP functionality
    cap_add:
      - NET_ADMIN
    networks:
      proxy:
        aliases:
          - adguard

networks:
  proxy:
    external: true
    name: proxy
