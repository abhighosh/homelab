version: 0.17-0

mqtt:
  enabled: true
  host: 192.168.0.220
  port: 1883
  user: frigate
  password: "{FRIGATE_MQTT_PASSWORD}"
  topic_prefix: frigate
  client_id: frigate

tls:
  enabled: true

auth:
  enabled: true
  cookie_secure: true

ffmpeg:
  retry_interval: 10

go2rtc:
  rtsp:
    username: "{FRIGATE_GO2RTC_USER}"
    password: "{FRIGATE_GO2RTC_PASSWORD}"
  streams:
    garage:
      - "rtsp://{FRIGATE_TAPO_USER}:{FRIGATE_TAPO_PASSWORD}@192.168.0.100:554/stream1#backchannel=0"
    living_room_side:
      # FFmpeg remuxes this camera's glitchy RTSP output without transcoding.
      - "ffmpeg:rtsp://{FRIGATE_TAPO_USER}:{FRIGATE_TAPO_PASSWORD}@192.168.0.204:554/stream1#video=copy#audio=copy"
    kitchen:
      - "rtsp://{FRIGATE_TAPO_USER}:{FRIGATE_TAPO_PASSWORD}@192.168.0.205:554/stream1#backchannel=0"
    living_room_back:
      - "rtsp://{FRIGATE_TAPO_USER}:{FRIGATE_TAPO_PASSWORD}@192.168.0.207:554/stream1#backchannel=0"
    snug:
      - "rtsp://{FRIGATE_TAPO_USER}:{FRIGATE_TAPO_PASSWORD}@192.168.0.208:554/stream1#backchannel=0"
    nest:
      # Direct go2rtc ingest learns Starling's in-band H.264 SPS/PPS data and
      # advertises it to strict MSE clients such as CrowsEye. An FFmpeg
      # stream-copy wrapper prevented those learned parameters from being
      # included in its static RTSP description.
      - "{FRIGATE_NEST_RTSP_URL}"

detect:
  enabled: false
  # Frigate still decodes a small number of frames for camera/API state even
  # when detection is disabled. One frame per second keeps that CPU cost low.
  fps: 1
  # This only controls Frigate's internal/API frame. Recordings and go2rtc
  # live streams retain the cameras' original resolution.
  width: 640
  height: 360

motion:
  enabled: false

record:
  enabled: true
  sync_recordings: true
  continuous:
    days: 30

snapshots:
  enabled: false

birdseye:
  enabled: false
  restream: false

cameras:
  garage:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/garage
          input_args: preset-rtsp-restream
          roles: [record, detect]
    ui:
      order: 0

  living_room_side:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/living_room_side
          input_args: preset-rtsp-restream
          roles: [record, detect]
    ui:
      order: 1

  kitchen:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/kitchen
          input_args: preset-rtsp-restream
          roles: [record, detect]
    ui:
      order: 2

  living_room_back:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/living_room_back
          input_args: preset-rtsp-restream
          roles: [record, detect]
    ui:
      order: 3

  snug:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/snug
          input_args: preset-rtsp-restream
          roles: [record, detect]
    ui:
      order: 4

  nest:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/nest
          input_args: preset-rtsp-restream
          roles: [record, detect]
    ui:
      order: 5
