version: 0.17-0

mqtt:
  enabled: false

tls:
  enabled: true

auth:
  enabled: true
  cookie_secure: true

ffmpeg:
  hwaccel_args: preset-nvidia
  retry_interval: 10

detectors:
  onnx:
    type: onnx

model:
  model_type: yolo-generic
  path: /config/model_cache/yolov9-t-320.onnx
  labelmap_path: /labelmap/coco-80.txt
  input_tensor: nchw
  input_dtype: float
  width: 320
  height: 320

go2rtc:
  rtsp:
    username: "{FRIGATE_GO2RTC_USER}"
    password: "{FRIGATE_GO2RTC_PASSWORD}"
  streams:
    garage:
      - "rtsp://{FRIGATE_TAPO_USER}:{FRIGATE_TAPO_PASSWORD}@192.168.0.100:554/stream1#backchannel=0"
    living_room_side:
      # FFmpeg remuxes this camera's glitchy RTSP output without transcoding.
      - "ffmpeg:rtsp://{FRIGATE_TAPO_USER}:{FRIGATE_TAPO_PASSWORD}@192.168.0.204:554/stream1#video=copy#audio=copy"
    kitchen:
      - "rtsp://{FRIGATE_TAPO_USER}:{FRIGATE_TAPO_PASSWORD}@192.168.0.205:554/stream1#backchannel=0"
    living_room_back:
      - "rtsp://{FRIGATE_TAPO_USER}:{FRIGATE_TAPO_PASSWORD}@192.168.0.207:554/stream1#backchannel=0"
    snug:
      - "rtsp://{FRIGATE_TAPO_USER}:{FRIGATE_TAPO_PASSWORD}@192.168.0.208:554/stream1#backchannel=0"
    nest:
      - "{FRIGATE_NEST_RTSP_URL}"

detect:
  enabled: true
  fps: 5
  width: 1280
  height: 720

objects:
  track:
    - person
    - car
    - cat
    - dog

record:
  enabled: true
  sync_recordings: true
  continuous:
    days: 14
  alerts:
    retain:
      days: 30
      mode: all
  detections:
    retain:
      days: 30
      mode: all

snapshots:
  enabled: true
  timestamp: true
  bounding_box: true
  retain:
    default: 30

birdseye:
  enabled: true
  mode: objects
  restream: false

cameras:
  garage:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/garage
          input_args: preset-rtsp-restream
          roles: [record, detect]
    ui:
      order: 0

  living_room_side:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/living_room_side
          input_args: preset-rtsp-restream
          roles: [record, detect]
    ui:
      order: 1

  kitchen:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/kitchen
          input_args: preset-rtsp-restream
          roles: [record, detect]
    ui:
      order: 2

  living_room_back:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/living_room_back
          input_args: preset-rtsp-restream
          roles: [record, detect]
    ui:
      order: 3

  snug:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/snug
          input_args: preset-rtsp-restream
          roles: [record, detect]
    ui:
      order: 4

  nest:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/nest
          input_args: preset-rtsp-restream
          roles: [record, detect]
    ui:
      order: 5
