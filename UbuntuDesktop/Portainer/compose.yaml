services:
  portainer:
    image: portainer/portainer-ce:lts
    container_name: portainer
    restart: always
    ports:
      - "8000:8000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    healthcheck:
      test: ["CMD", "/portainer", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  portainer_data:
    external: true
    name: portainer_data
