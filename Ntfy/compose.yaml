services:
  ntfy:
    image: binwiederhier/ntfy:v2.26.0
    container_name: ntfy
    command:
      - serve
    init: true
    restart: unless-stopped
    environment:
      TZ: Europe/London
    volumes:
      - ./server.yml:/etc/ntfy/server.yml:ro
      - ./data:/var/lib/ntfy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 http://127.0.0.1:80/v1/health -O - | grep -Eq '\"healthy\"[[:space:]]*:[[:space:]]*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      proxy:
        aliases:
          - ntfy

networks:
  proxy:
    external: true
    name: proxy
